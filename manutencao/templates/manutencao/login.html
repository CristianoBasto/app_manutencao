<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SisManut</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo span {
      font-size: 2.7rem;
    }
    .logo h1 {
      font-size: 1.8rem;
      color: #1e3a5f;
      margin-top: .4rem;
    }
    .logo p {
      font-size: .98rem;
      color: #718096;
      margin-top: .2rem;
    }
    .campo { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: .3rem;
    }
    input {
      width: 100%;
      padding: .55rem .8rem;
      border: 1px solid #cbd5e0;
      border-radius: 7px;
      font-size: .95rem;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #1e3a5f; }
    .btn {
      width: 100%;
      padding: .65rem;
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .2s;
    }
    .btn:hover { background: #2d4a6e; }
    .erro {
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 7px;
      color: #c53030;
      font-size: .85rem;
      padding: .6rem .9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>🔧</span>
      <h1>SisBastos</h1>
      <p>Sistema de Controle de Manutenção</p>
    </div>

    {% if form.errors %}
    <div class="erro">Usuário ou senha inválidos. Tente novamente.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="campo">
        <label for="id_username">Usuário</label>
        <input type="text" name="username" id="id_username" autofocus placeholder="Seu usuário"/>
      </div>
      <div class="campo">
        <label for="id_password">Senha</label>
        <input type="password" name="password" id="id_password" placeholder="Sua senha"/>
      </div>
      <button type="submit" class="btn">Entrar</button>
    </form>
  </div>
</body>
</html>
