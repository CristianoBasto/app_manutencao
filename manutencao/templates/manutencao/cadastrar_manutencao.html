<!-- ================================================
     cadastrar_manutencao.html
     ================================================ -->
{% extends "manutencao/base.html" %}
{% block conteudo %}

<!-- Select2 CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>
<style>
  /* Integra visual do Select2 com o restante do sistema */
  .select2-container--default .select2-selection--single {
    height: 38px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    padding: .3rem .5rem;
    font-size: .9rem;
  }
  .select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 36px;
  }
  .select2-container--default .select2-selection--single .select2-selection__rendered {
    line-height: 26px;
    color: #1a202c;
  }
  .select2-container--default .select2-results__option--highlighted {
    background-color: #1e3a5f !important;
  }
  .select2-search__field {
    border: 1px solid #cbd5e0 !important;
    border-radius: 4px !important;
    padding: .3rem .5rem !important;
    font-size: .9rem !important;
  }
  .select2-container { width: 100% !important; }
</style>

<h1>➕ Nova Manutenção</h1>
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="campo">
      <label>Equipamento</label>
      <select name="equipamento" id="select-equipamento" required>
        <option value="">Pesquise o equipamento...</option>
        {% for eq in equipamentos %}
        <option value="{{ eq.pk }}">{{ eq.nome }} — {{ eq.localizacao }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="campo">
      <label>Tipo</label>
      <select name="tipo" required>
        <option value="preventiva">Preventiva</option>
        <option value="corretiva">Corretiva</option>
      </select>
    </div>
    <div class="campo">
      <label>Descrição</label>
      <textarea name="descricao" required placeholder="Descreva o serviço..."></textarea>
    </div>
    <div class="campo">
      <label>Data de Registro</label>
      <input type="date" name="data_registro" required value="{{ today }}"/>
    </div>
    <div class="campo">
      <label>Data prevista</label>
      <input type="date" name="data_prevista" required/>
    </div>
    <div class="campo">
      <label>Responsável</label>
      <input type="text" name="responsavel" placeholder="Nome do técnico"/>
    </div>
    <div class="campo">
      <label>Horímetro (h)</label>
      <input type="number" name="horimetro" min="0" placeholder="Ex: 1250"/>
    </div>
    <div class="campo">
      <label>Oficina (opcional)</label>
      <select name="oficina" id="select-oficina">
        <option value="">Nenhuma / Serviço interno</option>
        {% for of in oficinas %}
        <option value="{{ of.pk }}">{{ of.nome }} {% if of.responsavel %}— {{ of.responsavel }}{% endif %}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Salvar manutenção</button>
  </form>
</div>

<!-- Select2 JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
<script>
  $(document).ready(function () {
    $("#select-equipamento").select2({
      placeholder: "Digite para pesquisar...",
      allowClear: true,
      language: {
        noResults: function () { return "Nenhum equipamento encontrado."; },
        searching: function () { return "Pesquisando..."; },
      }
    });
    $("#select-oficina").select2({
      placeholder: "Selecione uma oficina...",
      allowClear: true,
      language: {
        noResults: function () { return "Nenhuma oficina encontrada."; },
        searching: function () { return "Pesquisando..."; },
      }
    });
  });
</script>

{% endblock %}
